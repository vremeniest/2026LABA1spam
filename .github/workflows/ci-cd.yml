name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: |
        mkdir -p data/raw
    
    - name: Download dataset
      run: |
        python -c "import urllib.request; urllib.request.urlretrieve('https://raw.githubusercontent.com/justmarkham/DAT8/master/data/sms.tsv', 'data/raw/sms.tsv')"
    
    - name: Train model
      run: |
        python src/train.py
    
    - name: Run tests
      run: |
        pytest tests/ -v